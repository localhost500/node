<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h2>Login Page </h2>

    <!-- Messages Display -->
    {% if messages %}
        {% for message in messages %}
            <p style="color:
                {% if message.tags == 'error' %} red
                {% else %} green
                {% endif %}
            ">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <label>Username:</label><br>
        <input type="text" name="username"><br><br>

        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <button type="submit">Login</button>
    </form>

</body>
</html>
